services:
  argus:
    build: .
    container_name: argus-osint
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - argus-data:/app/data
      - ./argus.log:/app/argus.log
    environment:
      - ARGUS_DB_URL=sqlite+aiosqlite:////app/data/argus.db
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: argus-ollama
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  argus-data:
    driver: local
  ollama-data:
    driver: local
